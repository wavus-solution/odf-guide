<!DOCTYPE HTML>
<html>
<head>
	<meta charset="utf-8">
	<link href="https://developer.geon.kr/js/odf/odf.css" rel="stylesheet">
	<script type="text/javascript" src="https://developer.geon.kr/js/odf/odf.min.js"></script>
</head>
<body>
	<div id="map" class="odf-view" style="height:550px;"></div>
</body>
<style>
	.btn-control-newControl {
		position: relative;
		background-image: url(images/Symbols/PeoplePlaces/Light.png);
	}
	/*버튼1*/
	.btn-control-newControl-new01 {
		background-image: url(images/Symbols/Basic/Populated7.png);
	}
	/*버튼2*/
	.btn-control-newControl-new02 {
		background-image: url(images/Symbols/Basic/Populated6.png);
	}
</style>
<script>

	/* 맵객체 생성 (외부에서 사용할 때는 proxyURL, proxyParam 옵션이 필요합니다.) */
	var mapContainer = document.getElementById('map');
	var coord = new odf.Coordinate(199312.9996,551784.6924);
	var mapOption = {
		center : coord,
		zoom : 11,
		projection : 'EPSG:5186',
		//proxyURL: 'proxyUrl.jsp',
        //proxyParam: 'url',
		vWorldURL : 'https://gsapi.geon.kr/map/api/vworld/wmts',
		basemap : {
			vWorld : ['vWorldBase', 'vWorldWhite', 'vWorldMidnight', 'vWorldHybrid', 'vWorldSatellite'],
		},
    };
	var map = new odf.Map(mapContainer, mapOption);


	/* 베이스맵 컨트롤 생성 */
	var basemapControl = new odf.BasemapControl();
	basemapControl.setMap(map);

	{
		//사용자 정의 컨트롤 클래스 생성
	    class NewControl extends odf.Control {
	        constructor(param) {
	          super({
	            setMap: function () {},
	            removeMap: function () {},
	            clear: function () {},
	          });
	        }
	      }
		NewControl.subGroup = [
          {
              id: 'new01',
              name: '뉴1',
              click: (evt) => {
                alert('추가메뉴 1');
              },
            },
            {
              id: 'new02',
              name: '뉴2',
              click: (evt) => {
                alert('추가메뉴 2');
              },
            },
          ];

	      NewControl.click = function (evt) {
	        alert('사용자 정의 컨트롤 클릭!');
	      };
	      NewControl.controlId = 'newControl'; //컨트롤id
	      NewControl.groupIdx = 700; //컨트롤이 속할 그룹 번호 (1~)

	      var newControl = new NewControl();
	      newControl.setMap(map);
	}
</script>
</html>
