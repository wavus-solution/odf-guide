<!DOCTYPE HTML>
<html>
<head>
	<meta charset="utf-8">
	<link href="https://developer.geon.kr/js/odf/odf.css" rel="stylesheet">
	<script type="text/javascript" src="https://developer.geon.kr/js/odf/odf.min.js"></script>
</head>
<body>
	<div id="map" class="odf-view" style="height:550px;"></div>
	<div class="btnDiv">
		<input type="button" id="downloadSLD" class="onoffBtn" value="SLD 다운로드" onclick="download();">
	</div>
</body>
<script>

	/* 맵객체 생성 (외부에서 사용할 때는 proxyURL, proxyParam 옵션이 필요합니다.) */
	var mapContainer = document.getElementById('map');
	var coord = new odf.Coordinate(199312.9996,551784.6924);
	var mapOption = {
		center : coord,
		zoom : 11,
		projection : 'EPSG:5186',
		//proxyURL: 'proxyUrl.jsp',
        //proxyParam: 'url',
		vWorldURL : 'https://gsapi.geon.kr/map/api/vworld/wmts',
		basemap : {
			vWorld : ['vWorldBase', 'vWorldWhite', 'vWorldMidnight', 'vWorldHybrid', 'vWorldSatellite'],
		},
    };
	var map = new odf.Map(mapContainer, mapOption);


	/*포인트 레이어 추가*/
	var pointLayer = odf.LayerFactory.produce('geoserver', {
		method : 'get',
		server : 'https://geoserver.geon.kr/geoserver',
		layer : 'geonpaas:L100000256', // 발행된 레이어 명칭 (ex. 저장소명:레이어명)
		crtfckey : '',
		service : 'wms',
	});
	pointLayer.setMap(map);
	pointLayer.fit();

	/*포인트 스타일 생성*/
	var sld = odf.StyleFactory.produceSLD({
		rules : [ {
			name : 'My Rule', /*룰 이름*/
			/*해당 룰 표현 범위*/
			scaleDenominator : {
				// min: 100001,
				max : 100001,
			},
			/*해당 룰 적용 대상 한정
			   ★ 기본 비교
				- filter[0] : 비교연산자 ('==' , '!=' ,  '>' , '<' , '>=', '<=')
			    - filter[1] : 칼럼명
			    - filter[2] : 기준 값
			    ★ like 비교
				- filter[0] : '*='
			    - filter[1] : 칼럼명
			    - filter[2] : 비교 문자열 (wildCard="*" singleChar="." escape="!")
			                     (ex 1) *_2  => [somthing] + '_2'
			                     (ex 2) *_.   => [somthing] + '_' +[어떤 문자이든 한개의 문자]
			                     (ex 3)
			       ★ null 비교
			   	- filter[0] : 비교연산자 ('==' , '!=')
			       - filter[1] : 칼럼명
			       - filter[2] : null
			       ★ 두개 이상의 조건
			   	- filter[0] : 논리연산자('&&','||')
			       - filter[1] : 조건1
			       - filter[2] : 조건2
			       (ex) filter:['&&',['>=','id','3'],['!=',id,null]]
			 */
			//filter: ['<', 'id', '20'], //[기본 비교][ , 칼럼명, 기준값]
			//filter: ['*=', 'type', '*_2'], //[like비교] wildCard="*" singleChar="." escape="!"
			//filter: ['!=', 'id', null], //[isnull비교]
			//filter:['&&',['>=','id','3'],['!=',id,null], ...]//[두개 이상의 조건]
			symbolizers : [ {
				kind : 'Text',
				/*글자 색상*/
				color : '#AAFF00',
				/*사용할 폰트*/
				font : [ 'Times' ],
				/*라벨 모양
					-'normal' : 기본
					-'italic' : 이탤릭체 - italic체로 디자인된 폰트를 사용
					-'oblique' : 기본 글씨체를 비스듬하게 보여줌
				 */
				fontStyle : 'normal',
				/*라벨 두께
					-'normal' : 기본
					-'bold' : 굵게
				 */
				fontWeight : 'normal',
				/*라벨 텍스트
					{{칼럼명}} => 해당 칼럼 값
				 */
				label : '{{DONG_NM}}',
				/*라벨 크기*/
				size : 15,
				/*후광 색상 */
				haloColor : '#ffffff',
				/*후광 두께 */
				haloWidth : 5,

				/*★★라벨표현방식이 'LinePlacement'일경우 적용 속성 start★★*/
				/*레이블이 선의 곡선을 따르도록 할지 여부
				  - true : 레이블이 선의 곡선을 따르도록
				  - false : 레이블이 선의 곡선을 따르지 않게
				 */
				//followLine: true,
				/*레이블 반복 간격 조절
				   - 0 : 라벨 반복 x
					 - 양수 값 :  라인에 따라 라벨을 표시하는 빈도 조정. 값이 클수록 띄엄띄엄 나타남
				 */
				//repeat: 20,
				/*선을 따라 레이어의 변위를 제어. repeat 속성과 함께 사용할 경우, repeat속성보다 작은 값을 설정 */
				// maxDisplacement: 15,
				/*★★라벨표현방식이 'LinePlacement'일경우 적용 속성 end★★*/

				/*라벨 표현 방식*/
				LabelPlacement : [ {
					/*라벨표현방식- 기준점에 표현*/
					PointPlacement : [ {
						/*기준점을 기준으로 라벨이 배치되는 위치 결정*/
						AnchorPoint : [ {
							/*라벨이 x 기준점의 어느부분에 표시되는지(0~1)
							- 0(default) :left
							- 0.5 :center
							- 1 : right
							 */
							AnchorPointX : [ '0.5' ]
							/*라벨이 y 기준점의 어느부분에 표시되는지(0~1)
							 - 0(default) :bottom
							 - 0.5 :center
							 - 1 : top
							 */
							,
							AnchorPointY : [ '0.5' ]
						} ],
						/*라벨 기준점 좌표 이동(단위:pixel) */
						Displacement : [ {
							/*라벨 x 기준점 좌표 이동량 (+ : 왼쪽,- : 오른쪽)*/
							DisplacementX : [ '0.5' ]
							/*라벨 y 기준점 좌표 이동량 (+ : 위,- : 아래)*/
							,
							DisplacementY : [ '0.5' ]
						} ],
						/*라벨 회전 각도*/
						Rotation : [ '0' ],
					}, ],
				// /*라벨표현방식- 선을 따라서 표현*/
				// LinePlacement: [
				//  {
				//     /*라벨이 라인의 위에 위치할지(+), 아래에 위치할지(-) */
				//     PerpendicularOffset: ['10'],
				//   },
				//],*/
				}, ],
			}, ],
		}, ],
	});

	//sld 적용
	pointLayer.setSLD(sld);
	//적용된 sld 제거
	//pointLayer.setSLD(null);
	var json = pointLayer.getSLD().getJSON();
	var obj = pointLayer.getSLD().getObject();

	//sld 파일 다운로드
	function download() {
		var _sld = pointLayer.getSLD();
		if (_sld) {
			_sld.download();
		}
	}
</script>
</html>
