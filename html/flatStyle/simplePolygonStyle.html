<!DOCTYPE HTML>
<html>
<head>
	<meta charset="utf-8">
	<link href="https://developer.geon.kr/js/odf/odf.css" rel="stylesheet">
	<script type="text/javascript" src="https://developer.geon.kr/js/odf/odf.min.js"></script>
</head>
<body>
	<div id="map" class="odf-view" style="height:550px;"></div>
	<div class="btnDiv">
		<input type="button" id="changeStyle" class="onoffBtn toggle" value="폴리곤 스타일 변경">
	</div>
</body>
<script>
	/* 맵객체 생성 (외부에서 사용할 때는 proxyURL, proxyParam 옵션이 필요합니다.) */
	var mapContainer = document.getElementById('map');
	var coord = new odf.Coordinate(199312.9996,551784.6924);
	var mapOption = {
		center : coord,
		zoom : 11,
		projection : 'EPSG:5186',
		//proxyURL: 'proxyUrl.jsp',
        //proxyParam: 'url',
		vWorldURL : 'https://gsapi.geon.kr/map/api/vworld/wmts',
		basemap : {
			vWorld : ['vWorldBase', 'vWorldWhite', 'vWorldMidnight', 'vWorldHybrid', 'vWorldSatellite'],
		},
    };
	var map = new odf.Map(mapContainer, mapOption);

	/*포인트 레이어 추가*/
	var polygonLayer = odf.LayerFactory.produce('geoserver', {
		method: 'get',
		server: 'https://geoserver.geon.kr/geoserver',
		layer: 'geonpaas:L100000254',
		service : 'wfs',
	});
	polygonLayer.setMap(map);
	polygonLayer.fit();

	/*폴리곤 스타일 생성*/
	var polygonStyleObject ={
		'fill-color' : [206, 252, 254, 0.8],//채우기 색상

		'stroke-color':[255, 204, 255],//윤곽선 색상
		'stroke-line-cap':'butt',//윤곽선의 끝부분 모양('butt'(네모지게-선이 원래 길이보다 조금 일찍 끝남) / 'round' (둥글게) / 'square'(네모지게))
		'stroke-line-join':'miter',//윤곽선 꺽이는 모양('bevel' (꺾이는 부분을 지붕모양으로 )/ 'round' (둥글게)/ 'miter'(뾰족하게))
		//'stroke-line-dash':[10],//윤곽선 점선의 간격 크기
		'stroke-width':5,//윤곽선 두께

		'text-value' : 'Polygon',//텍스트 내용
		//'text-offset-x' : 0,//기준점으로부터 텍스트 x좌표 위치 이동
		//'text-offset-y' : 0,//기준점으로부터 텍스트 Y좌표 위치 이동
		//'text-rotation' :(Math.PI*270/180), //회전
		//'text-align' : 'left',//텍스트 수평정렬 ('left', 'right', 'center', 'end', 'start')
		//'text-baseline' : 'middle',//텍스트 수직정렬('bottom', 'top', 'middle'(기본값), 'alphabetic','hanging', 'ideographic')
		'text-font' : '20px Courier New',//폰트 크기(필수) 및 글씨체(필수), 두께(옵션) (ex) 'bold 10px sans-serif', 기본값 :'10px sans-serif'
		'text-fill-color' :'red',//텍스트 색상 색상
		'text-stroke-color' : 'blue',//택스트  색상
		'text-padding' : [5,5,5,5],//text와 background영역 사이의 여백 //placement :'line' 일 경우 미적용
		//'text-background-stroke-color' :  'black',//택스트 배경 테두리 선 색상 (placement :'line' 일경우 미적용)
		//'text-background-fill-color' :  'white',//택스트 배경 테두리 선 색상 (placement :'line' 일경우 미적용)
		'text-placement' :  'point',//텍스트를 나열하는 위치를 line을 따라 나타나게 할지, 특정 point에 나타나게 할지
		'text-max-angle' : 90*Math.PI/180,//텍스트가 꺾이는 정도를 제한(placement 속성이 'line'일때 적용)
		'text-overflow' :false,//텍스트를 나열한 길이보다 선이 짧을 경우, 넘치는 글자를 쭉 나열할지 여부(placement 속성이 'line'일때 적용). 기본값 false
		'text-scale' : 0.8,//텍스트 크기를 정해진 값의 n배로 적용
		'text-rotateWithView' : true,//지도가 회전할때 텍스트도 적절하게 회전할지 여부
	};
	polygonLayer.setStyle(polygonStyleObject);

	var styleFlag = true;
	document.getElementById('changeStyle').addEventListener('click',function (evt){
		polygonLayer.setStyle({
			...polygonStyleObject,
			'fill-color' : styleFlag?[205, 15, 211, 0.8]:polygonStyleObject['fill-color'],
		})
		styleFlag = !styleFlag;
	});

    </script>
</html>
