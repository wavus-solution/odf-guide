<!DOCTYPE HTML>
<html>

<head>
	<meta charset="utf-8">
	<link href="https://developer.geon.kr/js/odf/odf.css" rel="stylesheet">
	<script type="text/javascript" src="https://developer.geon.kr/js/odf/odf.min.js"></script>
</head>

<body>
	<div id="map" class="odf-view" style="height:550px;"></div>
	<div class="btnDiv">
		속성 : <select class="selectCustom" id="attributes" onChange="setStyle()">
			<option value="">선택
		</select>
		색상 : <select class="selectCustom" id="colorType" onChange="setStyle()"></select>
	</div>
</body>
<script>

	//색 종류 set
	var colorType = Object.keys(odf.ColorFactory.colorPallet);
	for (var i = 0; i < colorType.length; i++) {
		var color = colorType[i];

		var option = document.createElement('option');
		option.value = color;
		option.innerHTML = color;

		document.getElementById('colorType').appendChild(option);
	}


	/* 맵객체 생성 (외부에서 사용할 때는 proxyURL, proxyParam 옵션이 필요합니다.) */
	var mapContainer = document.getElementById('map');
	var coord = new odf.Coordinate(199312.9996,551784.6924);
	var mapOption = {
		center : coord,
		zoom : 11,
		projection : 'EPSG:5186',
		//proxyURL: 'proxyUrl.jsp',
        //proxyParam: 'url',
		vWorldURL : 'https://gsapi.geon.kr/map/api/vworld/wmts',
		basemap : {
			vWorld : ['vWorldBase', 'vWorldWhite', 'vWorldMidnight', 'vWorldHybrid', 'vWorldSatellite'],
		},
    };
	var map = new odf.Map(mapContainer, mapOption);


	/*포인트 레이어 추가*/
	var pointLayer = odf.LayerFactory.produce('geoserver', {
		method: 'get',
		server: 'https://geoserver.geon.kr/geoserver',
		layer: 'geonpaas:L100000256', // 발행된 레이어 명칭 (ex. 저장소명:레이어명)
		crtfckey: '',
		service: 'wfs',
	});
	pointLayer.setMap(map);
	pointLayer.fit();

	//레이어의 속성 종류 조회 -wfs레이어만 가능
	var attributes = pointLayer.getAttributes(['string']);//string 타입의 속성만 조회
	for (var i = 0; i < attributes.length; i++) {
		var attr = attributes[i];

		var option = document.createElement('option');
		option.value = attr.name;
		option.innerHTML = attr.name;
		if('SHELTER_DI'===attr.name){
			option.setAttribute('selected',true);
		}
		document.getElementById('attributes').appendChild(option);
	}
	setStyle();

	/*동적 스타일 생성*/
	function setStyle() {
		var attr = document.getElementById('attributes').value;
		if (attr === "") {
			return;
		}

		//값의 종류 조회
		var range = pointLayer.getAttributesRange(attr).values;
		//선택된 색상계열로 feature의 개수 만큼 색 생성
		var colorList = odf.ColorFactory.produce(
			document.getElementById('colorType').value, //색 계열 'red', 'blue', 'yellow', 'green', 'purple', 'brown', 'black', 'random' 중 하나
			Object.keys(range).length
		);

		//선택된 속성별로 색 부여
		var keys = Object.keys(range);
		var circleFillColorDefine = ['match',['get',attr]];
		keys.forEach((item, idx) => {
			circleFillColorDefine =circleFillColorDefine.concat([item,colorList[idx]]);
		});
		circleFillColorDefine =circleFillColorDefine.concat(['white']);

		//유형별 스타일 정의
		var styleObject ={
				'circle-radius' : 10,//크기
				'circle-fill-color' : circleFillColorDefine,//채우기 색
				'circle-stroke-color' : 'black',//운곽선 색
				'circle-stroke-width': 1,//운곽선 굵기
		};
		pointLayer.setStyle(styleObject);
	}
</script>

</html>
