<!DOCTYPE HTML>
<html>

<head>
	<meta charset="utf-8">
	<link href="https://developer.geon.kr/js/odf/odf.css" rel="stylesheet">
	<script type="text/javascript" src="https://developer.geon.kr/js/odf/odf.min.js"></script>
</head>

<body>
	<div id="map" class="odf-view" style="height:550px;"></div>
</body>
<script>

	/* 맵객체 생성 (외부에서 사용할 때는 proxyURL, proxyParam 옵션이 필요합니다.) */
	var mapContainer = document.getElementById('map');
	var coord = new odf.Coordinate(199312.9996,551784.6924);
	var mapOption = {
		center : coord,
		zoom : 11,
		projection : 'EPSG:5186',
		//proxyURL: 'proxyUrl.jsp',
        //proxyParam: 'url',
		vWorldURL : 'https://gsapi.geon.kr/map/api/vworld/wmts',
		basemap : {
			vWorld : ['vWorldBase', 'vWorldWhite', 'vWorldMidnight', 'vWorldHybrid', 'vWorldSatellite'],
		},
    };
	var map = new odf.Map(mapContainer, mapOption);

	/* 베이스맵 컨트롤 생성 */
	var basemapControl = new odf.BasemapControl();
	basemapControl.setMap(map);

	//다각형 feature 생성
	var polygonFeature = odf.FeatureFactory.produce({
		geometryType: 'polygon',
		coordinates: [[[191402.86974895213,535595.5818267891],[193542.4288614867,535425.5235802046],[193542.4288614867,533285.9644676701],[191402.86974895213,533455.0227142544],[191402.86974895213,535595.5818267891]]],
	});

	//0.1. (선택) 빈 벡터 레이어 생성하여 다각형 feature 넣기
	var layer = odf.LayerFactory.produce('empty', {});
	layer.addFeature(polygonFeature);
	layer.setMap(map);
	//0.2. (선택) 다각형 feature 위치로 이동
	layer.fit(true);
	//0.3. (선택) 다각형 feature 레이어 비활성화
	map.switchLayer(layer.getODFId(), false);

	//배경레이어 다각형으로 자르기
	basemapControl.setSwitchBaseLayerCallback(function (beforeLayer, afterLayer) {
		if (beforeLayer) {
			beforeLayer.revertLayer();
		}
		if (afterLayer) {
			afterLayer.cropByFeature(polygonFeature);
		}
	});
	//wms레이어 생성
	var wmsLayer = odf.LayerFactory.produce('geoserver', { // 레이어 호출 방법 (ex. geoserver, geojson)
		method: 'get',
		server: 'https://geoserver.geon.kr/geoserver', // 레이어가 발행된 서버 주소
		layer: 'geonpaas:L100000254', // 발행된 레이어 명칭 (ex. 저장소명:레이어명)
		service: 'wms', // 호출하고자 하는 레이여 형태(wms, wfs, wmts)
	});
	wmsLayer.setMap(map);
	//wms레이어 다각형으로 자르기
	wmsLayer.cropByFeature(polygonFeature);
	//원복
	//wmsLayer.revertLayer();


</script>

</html>
