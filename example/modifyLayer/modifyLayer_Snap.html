<!DOCTYPE HTML>
<html>
<head>
	<meta charset="utf-8">
	<link href="::OdfUrl::/odf.css" rel="stylesheet">
	<script type="text/javascript" src="::OdfUrl::/odf.min.js"></script>
</head>
<body>
	<div id="map" class="odf-view" style="height:550px;"></div>
	<div class="btnLogArea">
		<div class="innerBox">
			<button class="onoffOnlyBtn" onclick="setModifyTarget()">수정 도형 선택</button>
			<button id="insertBtn" class="onoffOnlyBtn" onclick="insert()">도형 추가</button>
			<button id="saveBtn" class="onoffOnlyBtn" onclick="save()">저장</button>
		</div>
	</div>
	<p>'수정 도형 선택' 버튼을 클릭하여 수정할 도형을 선택하세요.</p>
	<p>'도형 추가' 버튼을 클릭하여 수정할 도형을 선택하세요.</p>
	<p>'저장' 버튼 클릭 시 해당 결과값을 받을 수 있습니다.</p>
</body>
<script>

	/* 맵객체 생성 (외부에서 사용할 때는 proxyURL, proxyParam 옵션이 필요합니다.) */
	var mapContainer = document.getElementById('map');
	var coord = new odf.Coordinate(::coordx::,::coordy::);
	var mapOption = "::mapOpt::";
	var map = new odf.Map(mapContainer, mapOption);


	/*ui 없이 그리기 도구 생성*/
	var drawControl = new odf.DrawControl({
		message : {
			DRAWSTART_POLYGON : '추가할 도형을 그리기 위해 지도를 클릭하세요.'
		}
	});
	drawControl.setMap(map,false);
	//그리기 레이어
	var drawLayer = drawControl.findDrawVectorLayer();


	// 그리기 도형 추가
	function insert(){
		drawControl.draw('polygon');
		map.setSnap({
			// 픽셀 민감도
			pixelTolerance : 10,
			// 선에 붙는 설정 사용 여부
			edge : true,
			// 꼭지점에 붙는 설정 사용 여부
			vertex : true
		},[wfsLayer, drawControl.findDrawVectorLayer()]);

		odf.event.addListener(drawControl, 'drawend', function(event){
			map.removeSnap();
			//스냅 인터렉션 제거
		})

	}



	//wfs 레이어 생성
	var wfsLayer = odf.LayerFactory.produce('geoserver', {
		method : 'get',
		server : '::WfsAPI::',
		layer : '::polygonLayer1::',
		service : 'wfs',
	});
	wfsLayer.setMap(map);
	wfsLayer.fit();

	//툴팁 메세지 셋팅
	var divElem = document.createElement('div');
	divElem.innerHTML = '수정을 원하는 도형을 클릭하세요.';
	var tooltipMessage = new odf.Marker({
      position: [::coordx::,::coordy::],
      style: {
    	  	element: divElem
      },
	});
	//마우스 이동시 툴팁메세지 위치 이동
	odf.event.addListener(map, 'pointermove', function(event){
		tooltipMessage.setPosition(event.coordinate);
	});

	// 수정된 도형 목록
	var modifyFeature;
	var modifyLayer = odf.LayerFactory.produce('empty',{});
	modifyLayer.setMap(map);
	// 수정된 도형 스타일 정의
	var modifyFeatureStyle = odf.StyleFactory.produce({
	    fill: { color: [0, 0, 0, 0.2] },
	    stroke: {
	      color: 'red',
	      width: 5,
	    },
	  });
	modifyLayer.setStyle(modifyFeatureStyle)


	//수정할 도형 선택 이벤트 리스너 등록 후 비활성화
	var selectFeatureEventId = odf.event.addListener(map, 'click', function(evt) {
		var selectFeature = map.selectFeatureOnClick(evt);
		if(selectFeature.length===0){
			return;
		}

		selectFeature =  selectFeature[0].feature;
		var cloneFeature = selectFeature.clone();
		cloneFeature.setId(selectFeature.getId())
		modifyLayer.addFeature(cloneFeature);
		modifyFeature = cloneFeature;
		map.setModifyFeature(cloneFeature);
		map.setSnap({
			// 픽셀 민감도
			pixelTolerance : 10,
			// 선에 붙는 설정 사용 여부
			edge : true,
			// 꼭지점에 붙는 설정 사용 여부
			vertex : true
		}, [wfsLayer,drawControl.findDrawVectorLayer()]/*스냅을 적용할 레이어 배열*/);

		//툴팁 메세지 제거
		tooltipMessage.removeMap();
		//수정 도형 선택 이벤트 리스너 사용 중지
		odf.event.stateChange(selectFeatureEventId,'stopped');
	});
	odf.event.stateChange(selectFeatureEventId,'stopped');

	//수정할 도형 선택
	function setModifyTarget(){
		//수정 도형 초기화
		clear();
		//툴팁메세지등록
		tooltipMessage.setMap(map);
		//수정할 도형 선택 이벤트 리스너 활성화
		odf.event.stateChange(selectFeatureEventId,'normal');
	}

	// 그린 도형을 서버로 전송
	function save(){
		if(modifyFeature){
			// 지오서버에 보낼 xml 문자열
			var updateXmlText = map.sendToServerModified([modifyFeature], wfsLayer, 'update');
			alert('콘솔 창을 확인하세요.');
			console.log(updateXmlText);

			// 지오서버에 해당 xml 보내기
			//  'Content-Type': 'application/xml'으로 요청 보내야함

			//수정 도형  초기화
			clear();
			map.setModifyFeature(false);
			map.removeSnap();

			//툴팁 메세지 제거
			if(tooltipMessage.getMap()){
				tooltipMessage.removeMap();
			}
			//수정 도형 선택 이벤트 리스너 사용 중지
			odf.event.stateChange(selectFeatureEventId,'stopped');
		}





		var insertFeatureList = drawLayer.getFeatures();
		if(insertFeatureList.length!==0){
			// 지오서버에 보낼 xml 문자열
			var insertXmlText = map.sendToServerModified(insertFeatureList, wfsLayer, 'insert');
			alert('콘솔 창을 확인하세요.');
			console.log(insertXmlText);

			drawLayer.clear();
		}
	}


	//수정 도형 초기화
	function clear(){
		modifyFeature = undefined;
		modifyLayer.clear();
	}
</script>
</html>
