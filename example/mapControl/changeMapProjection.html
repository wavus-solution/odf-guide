<!DOCTYPE HTML>
<html>
<head>
	<meta charset="utf-8">
	<link href="::OdfUrl::/odf.css" rel="stylesheet">
	<script type="text/javascript" src="::OdfUrl::/odf.min.js"></script>
</head>
<body>
	<div id="map" class="odf-view" style="height:550px;"></div>
	<label>현재 지도 좌표계는 <span id="currentProjection"></span></label>
	<select onchange="changeMapProjection(this.value)" title="지도 좌표계를 선택하세요">
		<option value=''>선택</option>
		<option value="5179">EPSG:5179</option>
		<option value="5174">EPSG:5174</option>
		<option value="5186">EPSG:5186</option>
	</select>
</body>
<script>
	/* 맵 타겟 */
	var mapContainer = document.getElementById('map');

	/* 맵 중심점 */
	var coord = new odf.Coordinate(::coordx::,::coordy::);

	/* 맵객체 옵션 (외부에서 사용할 때는 proxyURL, proxyParam 옵션이 필요합니다.) */
	var mapOption = "::mapOpt::";
	/*
		* 배경지도 종류
		eMapBasic - 바로e맵 일반 지도
		eMapColor - 바로e맵 색각 지도
		eMapLowV - 바로e맵 큰글씨 지도
		eMapWhite - 바로e맵 백지도
		eMapEnglish - 바로e맵 영어 지도
		eMapChinese - 바로e맵 중어 지도
		eMapJapanese - 바로e맵 일어 지도
		eMapWhiteEdu - 바로e맵 교육용 백지도
		eMapAIR - 바로e맵  항공지도

		* 프록시 사용
		proxyURL: 'proxy.jsp' 프록시 설정
	 */

	/* 맵객체 생성 (외부에서 사용할 때는 proxyURL, proxyParam 옵션이 필요합니다.) */
	var map = new odf.Map(mapContainer, mapOption);
	var projectionLabel = document.getElementById('currentProjection');
	projectionLabel.innerText = map.getView().getProjection().getCode();

	function changeMapProjection(projection){
		if (!projection) {
			alert("좌표계를 선택하세요.");
			return;
		}
		map.setViewOption({
			resolutions: map.getView().getResolutions(),
			projection: `EPSG:${projection}`
		});
		projectionLabel.innerText = map.getView().getProjection().getCode();
	}

</script>
</html>
